# Default configuration for Chuck Dreamer

seed: null  # Randomized at runtime if unset

model:
  rssm:
    stoch_size: 30
    deter_size: 200
    hidden_size: 200
    min_stddev: 0.1
  encoder:
    embed_size: 200
    mlp_hidden: [200, 200]
    cnn_channels: [32, 64, 128]
    cnn_kernels: [4, 4, 4]
    cnn_strides: [2, 2, 2]
  decoder:
    mlp_hidden: [200, 200]
    cnn_channels: [128, 64, 32]
    cnn_kernels: [4, 4, 4]
    cnn_strides: [2, 2, 2]
  reward:
    hidden: [200, 200]
  actor:
    hidden: [300, 300, 300]
    min_stddev: 0.1
    init_stddev: 5.0
    mean_scale: 5.0
  critic:
    hidden: [300, 300, 300]

training:
  batch_size: 32
  seq_len: 50
  num_iterations: 100
  num_collect_episodes: 5
  num_gradient_steps: 10
  min_episode_len: 50
  save_every: 10
  eval_every: 5

  optimizer:
    wm_lr: 6e-4
    actor_lr: 8e-5
    critic_lr: 8e-5
    adam_eps: 1e-5
    gradient_clipping: 1000.0
    weight_decay: 0

  losses:
    recon_scale: 1.0
    reward_scale: 1.0
    kl_scale: 1.0
    free_nats: 3.0
    entropy_scale: 1.0

data:
  warmup_path: "data/generated-pushes/"
  warmup_format: "rerun"  # "hdf5" or "rerun"
  shuffle: true
  buffer_size: 10000

logging:
  logger: "trackio" # "none", "wandb", "trackio"
  project_name: "chuck-dreamer"
  log_every: 100
  save_dir: "checkpoints"
  experiment_name: null  # Will be auto-generated if null

hardware:
  device: "mlx"  # "auto", "mlx", "cpu", "gpu", "mps"

evaluation:
  num_episodes: 10
  render: false
  save_videos: false
  video_dir: "videos"

sim:
  difficulty: "medium"
  render_size: "512x512"
  output_dir: "data/generated-pushes/"
  format: "rerun"  # "hdf5" or "rerun"
  max_steps: 100
  table_size: [0.60, 0.5, 0.02]  # [half_x, half_y, half_z]

env:
  obs_mode: "state"   # "state" | "image" | "image_proprio"
  act_mode: "ee"      # "joint" | "ee"

reward:
  kind: "goal_distance"
